reviews:
  - quote: "Our APS bill dropped from $487 to $291 the first full summer after installation. We've been paying for that AC waste for 18 years. I wish we'd done this sooner."
    name: "Sandra M."
    city: "Oro Valley, AZ"
    savings: "$2,352 saved/yr"
  - quote: "DaBella quoted $23,800. Radiant quoted $12,200. I did the research — it's the exact same Alside product. Their product specialist was upfront about every line item from the first visit."
    name: "Robert T."
    city: "Tucson, AZ"
    savings: "$11,600 saved"
  - quote: "My kids sleep through the morning now. I didn't expect noise reduction to be my favorite part — but the house is genuinely quieter. Electric bill dropped over $140 a month too."
    name: "Maria L."
    city: "Marana, AZ"
    savings: "$1,680 saved/yr"
